<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pantalla publica</title>
  <link rel="stylesheet" href="/styles.css?v=20260615-5001">
</head>
<body class="display-body">
  <main class="display-page">
    <header class="display-head">
      <div>
        <span class="badge">Pantalla publica</span>
        <h1 id="displayTitle">Agenda</h1>
      </div>
      <time id="displayClock"></time>
    </header>
    <section id="displayMessage" class="display-message hidden"></section>
    <div id="displayCarouselStatus" class="display-carousel-status hidden"></div>
    <section id="displayContent" class="display-content"></section>
  </main>
  <script>
    const params = new URLSearchParams(location.search);
    const eventId = params.get("event_id") || "0";
    let refreshSeconds = 10;
    let displayRows = [];
    let displayConfig = {};
    let carouselPage = 0;
    let carouselTimer = null;

    const $ = (selector) => document.querySelector(selector);
    const fmtTime = (value) => new Date(value).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
    const fmtClock = () => new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" });

    function stateClass(text) {
      if (text.includes("Completa") || text.includes("Cancelada")) return "red";
      if (text.includes("Ultimos") || text.includes("Demorada")) return "yellow";
      if (text.includes("En curso")) return "blue";
      if (text.includes("Finalizada")) return "gray";
      return "green";
    }

    function renderAirport(rows) {
      return rows.map((row) => `
        <article class="display-row">
          <time>${fmtTime(row.starts_at)}</time>
          <strong>${row.space_name}</strong>
          <span>${row.title}</span>
          <em class="${stateClass(row.status)}">${row.status}</em>
          <em class="${stateClass(row.availability)}">${row.availability}</em>
        </article>
      `).join("");
    }

    function airportPageSize() {
      const head = $(".display-head")?.offsetHeight || 92;
      const message = $("#displayMessage").classList.contains("hidden") ? 0 : ($("#displayMessage").offsetHeight || 0);
      const status = $("#displayCarouselStatus").classList.contains("hidden") ? 0 : ($("#displayCarouselStatus").offsetHeight || 0);
      const available = Math.max(window.innerHeight - head - message - status - 104, 300);
      return Math.max(4, Math.floor(available / 91));
    }

    function carouselSlice(rows) {
      const pageSize = airportPageSize();
      const pages = Math.max(Math.ceil(rows.length / pageSize), 1);
      if (carouselPage >= pages) carouselPage = 0;
      const start = carouselPage * pageSize;
      $("#displayCarouselStatus").classList.toggle("hidden", pages <= 1);
      $("#displayCarouselStatus").textContent = pages > 1 ? `Pagina ${carouselPage + 1} de ${pages} - ${rows.length} charlas seleccionadas` : "";
      return rows.slice(start, start + pageSize);
    }

    function renderCarousel() {
      if (displayConfig.paused) return;
      const rows = displayRows || [];
      if (displayConfig.mode === "now") {
        $("#displayCarouselStatus").classList.add("hidden");
        $("#displayContent").innerHTML = renderNow(rows);
      } else if (displayConfig.mode === "room") {
        $("#displayCarouselStatus").classList.add("hidden");
        $("#displayContent").innerHTML = renderRoom(rows);
      } else {
        $("#displayContent").innerHTML = renderAirport(carouselSlice(rows));
      }
    }

    function scheduleCarousel() {
      clearInterval(carouselTimer);
      carouselTimer = null;
      if ((displayConfig.mode || "airport") !== "airport") return;
      const pageSize = airportPageSize();
      if ((displayRows || []).length <= pageSize) return;
      carouselTimer = setInterval(() => {
        const pages = Math.max(Math.ceil(displayRows.length / airportPageSize()), 1);
        carouselPage = (carouselPage + 1) % pages;
        renderCarousel();
      }, Math.max(6, Math.min(refreshSeconds, 12)) * 1000);
    }

    function renderNow(rows) {
      const now = new Date();
      const current = rows.filter((row) => new Date(row.starts_at) <= now && new Date(row.ends_at) >= now);
      const next = rows.filter((row) => new Date(row.starts_at) > now).slice(0, 6);
      const later = rows.filter((row) => new Date(row.starts_at) > now).slice(6, 14);
      const group = (title, items) => `
        <div class="display-group">
          <h2>${title}</h2>
          ${renderAirport(items)}
        </div>
      `;
      return group("Ahora", current) + group("Proximas", next) + group("Luego", later);
    }

    function renderRoom(rows) {
      const byRoom = {};
      rows.forEach((row) => {
        byRoom[row.space_name] ||= [];
        byRoom[row.space_name].push(row);
      });
      return Object.entries(byRoom).map(([room, items]) => `
        <div class="display-group">
          <h2>${room}</h2>
          ${renderAirport(items.slice(0, 4))}
        </div>
      `).join("");
    }

    async function loadDisplay() {
      const response = await fetch(`/api/public-display?event_id=${encodeURIComponent(eventId)}`);
      const data = await response.json();
      displayConfig = data.config || {};
      refreshSeconds = Number(displayConfig.refresh_seconds || 10);
      if (displayConfig.message) {
        $("#displayMessage").classList.remove("hidden");
        $("#displayMessage").textContent = displayConfig.message;
      } else {
        $("#displayMessage").classList.add("hidden");
      }
      if (displayConfig.paused) return;
      displayRows = data.activities || [];
      carouselPage = 0;
      renderCarousel();
      scheduleCarousel();
    }

    async function loop() {
      await loadDisplay();
      setTimeout(loop, refreshSeconds * 1000);
    }

    function updateClock() {
      $("#displayClock").textContent = fmtClock();
    }

    window.addEventListener("resize", () => {
      renderCarousel();
      scheduleCarousel();
    });
    updateClock();
    setInterval(updateClock, 1000);
    loop();
  </script>
</body>
</html>
