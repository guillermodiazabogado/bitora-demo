<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Imprimir credenciales</title>
  <link rel="stylesheet" href="/styles.css?v=20260615-5001">
</head>
<body class="print-body">
  <header class="print-toolbar">
    <div>
      <strong id="printTitle">Credenciales</strong>
      <span id="printCount">Preparando impresion</span>
    </div>
    <div class="actions">
      <button id="printBtn" type="button">Imprimir</button>
      <a class="button ghost" href="/">Volver</a>
    </div>
  </header>
  <main id="printSheet" class="print-sheet"></main>
  <script>
    const params = new URLSearchParams(location.search);
    const eventId = params.get("event_id") || "";
    const q = params.get("q") || "";
    const status = params.get("status") || "";
    const type = params.get("type") || "";
    const mode = params.get("mode") || "card";

    const escapeHtml = (value) => String(value || "").replace(/[&<>"']/g, (char) => ({
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      '"': "&quot;",
      "'": "&#39;",
    }[char]));

    function matchesFilters(row) {
      const statusOk = !status
        || (status === "cancelled" && row.status === "cancelled")
        || (status === "checked" && Boolean(row.checked_in_at) && row.status !== "cancelled")
        || (status === "pending" && !row.checked_in_at && row.status !== "cancelled");
      const typeOk = !type || row.type === type;
      return statusOk && typeOk;
    }

    function credential(row) {
      return `
        <article class="print-card ${row.status === "cancelled" ? "cancelled" : ""}">
          <div class="print-card-head">
            <strong>${escapeHtml(row.event_name)}</strong>
            <span>${escapeHtml(row.type)}</span>
          </div>
          <h2>${escapeHtml(row.first_name)} ${escapeHtml(row.last_name)}</h2>
          <p>${escapeHtml(row.company || row.email)}</p>
          <img src="/api/qr.svg?token=${encodeURIComponent(row.token)}" alt="QR ${escapeHtml(row.token)}">
          <code>${escapeHtml(row.token)}</code>
          <small>${row.checked_in_at ? "Acreditado" : row.status === "cancelled" ? "Cancelado" : "Pendiente"}</small>
        </article>
      `;
    }

    function wristband(row) {
      const fullName = `${row.first_name || ""} ${row.last_name || ""}`.trim() || "Participante";
      const company = row.company || row.type || "";
      return `
        <article class="wristband-page">
          <section class="wristband-strip">
            <div class="wristband-qr"><img src="/api/qr.svg?token=${encodeURIComponent(row.token)}" alt="QR ${escapeHtml(row.token)}"></div>
            <div class="wristband-info">
              <strong>${escapeHtml(fullName)}</strong>
              <span>${escapeHtml(company)}</span>
              <code>${escapeHtml(row.token)}</code>
            </div>
            <div class="wristband-brand">
              BITORA
              <small>${escapeHtml(row.event_name || "Evento")}</small>
            </div>
          </section>
        </article>
      `;
    }

    async function loadPrint() {
      const response = await fetch(`/api/accreditations?event_id=${encodeURIComponent(eventId)}&q=${encodeURIComponent(q)}&limit=2000`);
      const rows = (await response.json()).filter(matchesFilters);
      const isWristband = mode === "wristband";
      document.getElementById("wristbandPageStyle")?.remove();
      if (isWristband) {
        const style = document.createElement("style");
        style.id = "wristbandPageStyle";
        style.textContent = `
          .wristband-print-body { background: #eef3f5; }
          .wristband-sheet { display: grid; gap: 8px; margin: 0 auto; max-width: 1040px; padding: 18px; }
          .wristband-page { align-items: center; background: #fff; box-shadow: 0 8px 22px rgba(0,0,0,.12); color: #000; display: flex; height: 25mm; margin: 0 auto; padding: 1.2mm 3mm; width: 250mm; }
          .wristband-strip { align-items: center; border: .35mm solid #111; display: grid; gap: 3mm; grid-template-columns: 21mm minmax(0, 1fr) 34mm; height: 22.5mm; padding: 1mm 2.4mm; width: 244mm; }
          .wristband-qr { align-items: center; display: flex; height: 19mm; justify-content: center; width: 19mm; }
          .wristband-qr img { display: block; height: 19mm; image-rendering: pixelated; width: 19mm; }
          .wristband-info { min-width: 0; overflow: hidden; }
          .wristband-info strong { color: #000; display: block; font-size: 12px; line-height: 1.05; overflow: hidden; text-overflow: ellipsis; text-transform: uppercase; white-space: nowrap; }
          .wristband-info span { color: #000; display: block; font-size: 9px; line-height: 1.15; margin-top: 1mm; overflow: hidden; text-overflow: ellipsis; text-transform: uppercase; white-space: nowrap; }
          .wristband-info code { background: transparent; color: #000; display: block; font-family: Consolas, Monaco, monospace; font-size: 9px; font-weight: 700; line-height: 1; margin-top: 1mm; padding: 0; white-space: nowrap; }
          .wristband-brand { border-left: .3mm solid #111; color: #000; font-size: 10px; font-weight: 800; line-height: 1.1; padding-left: 2mm; text-align: center; text-transform: uppercase; }
          .wristband-brand small { color: #000; display: block; font-size: 7px; font-weight: 700; margin-top: 1mm; }
          @media print {
            @page { size: 250mm 25mm; margin: 0; }
            body.wristband-print-body { background: #fff; width: 250mm; }
            .wristband-print-body .print-toolbar { display: none; }
            .wristband-print-body .wristband-sheet { display: block; margin: 0; max-width: none; padding: 0; }
            .wristband-page { box-shadow: none; break-after: page; page-break-after: always; }
            .wristband-page:last-child { break-after: auto; page-break-after: auto; }
          }
        `;
        document.head.appendChild(style);
      }
      document.body.classList.toggle("wristband-print-body", isWristband);
      document.getElementById("printTitle").textContent = isWristband ? "Pulseras QR" : (rows[0]?.event_name || "Credenciales");
      document.getElementById("printCount").textContent = `${rows.length} ${isWristband ? "pulsera(s)" : "credencial(es)"}`;
      document.getElementById("printSheet").className = isWristband ? "wristband-sheet" : "print-sheet";
      document.getElementById("printSheet").innerHTML = rows.map(isWristband ? wristband : credential).join("") || `<p class="empty">No hay ${isWristband ? "pulseras" : "credenciales"} para imprimir.</p>`;
    }

    document.getElementById("printBtn").addEventListener("click", () => window.print());
    loadPrint().catch((err) => {
      document.getElementById("printSheet").innerHTML = `<p class="empty">${escapeHtml(err.message)}</p>`;
    });
  </script>
</body>
</html>
